// 既存記録のdateKeyを補完（後方互換）
function getDateKey(v) {
  if (v.dateKey) return v.dateKey;
  // datetime "12/3 14:30" + yearMonth "2026-12" から復元
  if (v.yearMonth && v.datetime) {
    const m = v.datetime.match(/^(\d+)\/(\d+)/);
    if (m) {
      const year = v.yearMonth.split('-')[0];
      return `${year}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
    }
  }
  return '';
}

function updateDailyCount() {
  const dateKey = document.getElementById('daily-date')?.value;
  const el = document.getElementById('daily-count');
  const labelEl = document.getElementById('daily-date-label');

  // 日付ラベル更新
  if (labelEl) {
    if (dateKey) {
      const d = new Date(dateKey);
      const wd = ['日','月','火','水','木','金','土'][d.getDay()];
      labelEl.textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${wd})`;
    } else {
      labelEl.textContent = '日付を選択';
    }
  }

  if (!el) return;
  if (!dateKey) { el.textContent = '日付を選択してください'; return; }
  const count = visits.filter(v => getDateKey(v) === dateKey).length;
  el.textContent = `${count}件の訪問記録`;
}

function exportDailyEmail() {
  const dateKey = document.getElementById('daily-date')?.value;
  if (!dateKey) { showToast('日付を選択してください'); return; }
  const dailyVisits = visits
    .filter(v => getDateKey(v) === dateKey)
    .sort((a, b) => a.datetime.localeCompare(b.datetime));
  if (dailyVisits.length === 0) { showToast('この日の記録はありません'); return; }

  const [yyyy, mm, dd] = dateKey.split('-');
  const dateLabel = `${parseInt(mm)}/${parseInt(dd)}`;

  // 優先度サマリーを生成
  const actionVisits = dailyVisits.filter(v => FLAGS.some(f => v.flags?.[f.id]));
  const infoVisits   = dailyVisits.filter(v => !FLAGS.some(f => v.flags?.[f.id]));

  let summaryBlock = '【本日のサマリー】\n';
  summaryBlock += `訪問 ${dailyVisits.length}施設`;
  if (actionVisits.length > 0) summaryBlock += `　/ 要対応 ${actionVisits.length}件`;
  summaryBlock += '\n';

  if (actionVisits.length > 0) {
    summaryBlock += '\n▼ 要対応\n';
    summaryBlock += actionVisits.map(v => {
      const flagLabels = FLAGS.filter(f => v.flags?.[f.id]).map(f => f.label).join('・');
      return `★ ${v.facility}　→ ${flagLabels}`;
    }).join('\n');
  }
  if (infoVisits.length > 0) {
    summaryBlock += '\n\n▼ 情報共有のみ\n';
    summaryBlock += infoVisits.map(v => `　${v.facility}`).join('\n');
  }

  // 件名にフラグ状況を反映
  const subjectPrefix = actionVisits.length > 0 ? '【要対応あり】' : '【情報共有】';
  const subject = encodeURIComponent(`${subjectPrefix}訪問報告まとめ ${dateLabel}（${dailyVisits.length}施設）`);

  // 各施設の詳細ブロック
  const blocks = dailyVisits.map((v, idx) => {
    const checkedLines = ITEMS
      .filter(i => v.items?.[i.id]?.checked)
      .map(i => `・${i.label}${v.items[i.id]?.note ? '\n' + v.items[i.id].note : ''}`).join('\n\n');
    const activeFlags = FLAGS.filter(f => v.flags?.[f.id]).map(f => f.label).join('・');
    const hasAction = FLAGS.some(f => v.flags?.[f.id]);
    return [
      `━━━━━━━━━━━━━━━━━━━━`,
      `【${idx + 1}】${hasAction ? '★ ' : ''}${v.facility}　${v.datetime}`,
      `━━━━━━━━━━━━━━━━━━━━`,
      v.contact ? `■ 担当:${v.contact}` : '',
      `■ 作業:${v.mainWork || '—'}`,
      activeFlags ? `■ ステータス：${activeFlags}` : '',
      v.flagMemo ? `\n■ 共有メモ\n${v.flagMemo}` : '',
      checkedLines ? `\n■ 施設情報\n${checkedLines}` : '',
      v.memo ? `\n■ メモ\n${v.memo}` : '',
    ].filter(l => l !== '').join('\n');
  }).join('\n\n');

  const body = [
    `お疲れ様です。`,
    `本日の情報共有です。`,
    ``,
    summaryBlock,
    ``,
    blocks,
    ``,
    `ご確認をお願いいたします。`,
  ].join('\n');

  window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;
}

function exportFromDetail(id) {
  const v = visits.find(v => v.id === id);
  if (!v) return;
  const checkedLines = ITEMS.filter(i => v.items[i.id]?.checked)
    .map(i => `・${i.label}${v.items[i.id]?.note ? '\n' + v.items[i.id].note : ''}`).join('\n\n');
  const activeFlags = FLAGS.filter(f => v.flags?.[f.id]).map(f => f.label).join('・');
  const body = [
    `お疲れ様です。`,
    `表題の件、訪問してきましたので共有いたします。`,
    ``,
    `【訪問報告】${v.facility}　${v.datetime}`,
    ``,
    `■ 施設:${v.facility}`,
    v.contact ? `■ 担当:${v.contact}` : '',
    `■ 作業:${v.mainWork || '—'}`,
    activeFlags ? `■ ステータス：${activeFlags}` : '',
    v.flagMemo ? `\n■ 共有メモ\n${v.flagMemo}` : '',
    checkedLines ? `\n■ 施設情報\n${checkedLines}` : '',
    v.memo ? `\n■ メモ\n${v.memo}` : '',
    ``,
    `ご確認をお願いいたします。`,
  ].filter(l => l !== '').join('\n');
  const subject = encodeURIComponent(`【訪問報告】${v.facility} ${v.datetime}`);
  window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;
  v.exported = true;
  localStorage.setItem('visits', JSON.stringify(visits));
}

// ── SUMMARY ──
let summaryYear = new Date().getFullYear();
let summaryMonth = new Date().getMonth() + 1;

function renderSummary() {
  const ym = `${summaryYear}-${String(summaryMonth).padStart(2,'0')}`;
  document.getElementById('summary-month-label').textContent =
    `${summaryYear}年 ${summaryMonth}月`;

  const monthly = visits.filter(v => v.yearMonth === ym);
  const el = document.getElementById('summary-content');

  if (monthly.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--text3);font-family:DM Mono,monospace;font-size:13px">この月の記録なし</div>`;
    return;
  }

  // 集計
  const facilityCount = {};
  const itemCount = {};
  const mainWorkCount = {};
  const flagCount = {};
  ITEMS.forEach(i => { itemCount[i.id] = 0; });
  FLAGS.forEach(f => { flagCount[f.id] = 0; });

  monthly.forEach(v => {
    facilityCount[v.facility] = (facilityCount[v.facility] || 0) + 1;
    if (v.mainWork) mainWorkCount[v.mainWork] = (mainWorkCount[v.mainWork] || 0) + 1;
    ITEMS.forEach(i => { if (v.items[i.id]?.checked) itemCount[i.id]++; });
    FLAGS.forEach(f => { if (v.flags?.[f.id]) flagCount[f.id]++; });
  });

  const topItems = ITEMS.slice().sort((a,b) => itemCount[b.id] - itemCount[a.id]);
  const facilityEntries = Object.entries(facilityCount).sort((a,b) => b[1]-a[1]);
  const mainWorkEntries = Object.entries(mainWorkCount).sort((a,b) => b[1]-a[1]);
  const maxFac = facilityEntries[0]?.[1] || 1;
  const maxItem = itemCount[topItems[0].id] || 1;
  const totalFlags = Object.values(flagCount).reduce((a,b)=>a+b, 0);
  const flaggedVisits = monthly.filter(v => FLAGS.some(f => v.flags?.[f.id])).length;

  el.innerHTML = `
    <!-- KPI -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;margin-top:8px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px">
        <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">訪問件数</div>
        <div style="font-size:32px;font-weight:500;color:var(--text);letter-spacing:-0.03em">${monthly.length}<span style="font-size:14px;color:var(--text3);margin-left:2px">件</span></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px">
        <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">施設数</div>
        <div style="font-size:32px;font-weight:500;color:var(--text);letter-spacing:-0.03em">${Object.keys(facilityCount).length}<span style="font-size:14px;color:var(--text3);margin-left:2px">施設</span></div>
      </div>
    </div>

    <!-- つなぐ（共有事項）統計 -->
    ${totalFlags > 0 ? `<div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--active);border-radius:2px;padding:16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase">つなぐ（共有事項）</div>
        <div style="font-family:DM Mono,monospace;font-size:11px;color:var(--active);font-weight:500">${flaggedVisits}件 / ${monthly.length}件</div>
      </div>
      ${FLAGS.map(f => {
        const count = flagCount[f.id];
        if (count === 0) return '';
        return `<div onclick="openFlagDetail('${f.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer">
          <span style="font-size:13px;color:var(--text)">${f.label}</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span style="font-family:DM Mono,monospace;font-size:13px;color:var(--active);font-weight:500">${count}件</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;color:var(--text3)"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- 確認項目ランキング -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:10px">
      <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:14px">確認項目</div>
      ${topItems.map(item => {
        const count = itemCount[item.id];
        const pct = maxItem > 0 ? Math.round(count / maxItem * 100) : 0;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:${count>0?'var(--text)':'var(--text3)'}"><span style="display:inline-flex;width:14px;height:14px;flex-shrink:0">${item.icon}</span>${item.label}</div>
            <span style="font-family:DM Mono,monospace;font-size:12px;color:var(--text2)">${count}件</span>
          </div>
          <div style="height:4px;background:var(--surface2);border-radius:2px">
            <div style="height:4px;background:${count>0?'var(--active)':'var(--border)'};border-radius:2px;width:${pct}%;transition:width 0.3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- 施設別訪問回数 -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:10px">
      <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:14px">施設別訪問回数</div>
      ${facilityEntries.map(([name, count]) => {
        const pct = Math.round(count / maxFac * 100);
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:13px;color:var(--text)">${name}</span>
            <span style="font-family:DM Mono,monospace;font-size:12px;color:var(--text2)">${count}回</span>
          </div>
          <div style="height:4px;background:var(--surface2);border-radius:2px">
            <div style="height:4px;background:var(--accent2);border-radius:2px;width:${pct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    ${mainWorkEntries.length > 0 ? `
    <!-- 作業種別 -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px">
      <div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:12px">作業種別</div>
      ${mainWorkEntries.map(([work, count]) =>
        `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:var(--text)">${work}</span>
          <span style="font-family:DM Mono,monospace;font-size:12px;color:var(--text2)">${count}件</span>
        </div>`
      ).join('')}
    </div>` : ''}
  `;
}

function shiftMonth(dir) {
  summaryMonth += dir;
  if (summaryMonth > 12) { summaryMonth = 1; summaryYear++; }
  if (summaryMonth < 1)  { summaryMonth = 12; summaryYear--; }
  renderSummary();
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const tabMap = { 'screen-list': 'tab-list', 'screen-master': 'tab-master', 'screen-summary': 'tab-summary', 'screen-export': 'tab-export', 'screen-progress': 'tab-progress' };
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (tabMap[id]) document.getElementById(tabMap[id])?.classList.add('active');
  const hideNav = ['screen-form', 'screen-detail'].includes(id);
  document.querySelector('.header').style.display = hideNav ? 'none' : 'flex';
  document.querySelector('.header-nav').style.display = hideNav ? 'none' : 'flex';
  if (id === 'screen-master') { renderMasterList(); renderWorkList(); renderExportStats(); }
  if (id === 'screen-progress') { renderProgressScreen(); }
  if (id === 'screen-summary') renderSummary();
  if (id === 'screen-export') renderExportStats();
  window.scrollTo(0,0);
}

let detailReturnTo = null;
function goBack() {
  const target = detailReturnTo || 'screen-list';
  detailReturnTo = null;
  showScreen(target);
}

// ── スワイプでタブ切り替え（無効化中） ──
const TAB_ORDER = ['screen-list', 'screen-export', 'screen-summary', 'screen-master'];
// スワイプは現在無効化されています

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

  document.getElementById('master-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addFacility();
  });
  document.getElementById('work-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addWork();
  });
  init();
</script>
</body>
